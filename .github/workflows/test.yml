name: Test

on:
  push:
    branches: [ "**" ]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install Dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run --extra dev ruff check
      - name: Check generated doc blocks
        run: uv run --extra dev make sources-check

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Unit Tests
        run: |
          uv run pytest tests/ -m "not network" --timeout=30 -v --junitxml=.omp/test-results/junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: .omp/test-results/junit.xml

  scraper-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        shard-index: [0, 1]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium

      - name: Test live scrapers shard ${{ matrix.shard-index }}
        run: uv run pytest tests/test_scrapers.py -m network -v --timeout=90
        env:
          NEWSWATCH_LIVE_SHARD_COUNT: "2"
          NEWSWATCH_LIVE_SHARD_INDEX: ${{ matrix.shard-index }}

  scraper-advisory:
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium
      - name: Test nonsense, duplicates, and Linux-excluded scrapers
        run: uv run pytest tests/test_scrapers_minimal.py -m network -v --timeout=180
        env:
          NEWSWATCH_TEST_FORCE_ALL: "1"