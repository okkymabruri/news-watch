name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run --extra dev ruff check
      - name: Non-network tests
        run: uv run --extra dev pytest tests/ -m "not network" --timeout=30 -q
      - name: Check generated doc blocks
        run: uv run --extra dev make sources-check
      - name: Verify lockfile is in sync
        run: uv lock --check
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          FILE_VERSION=$(grep -Pom1 '^\s*version\s*=\s*"\K[^"]+' pyproject.toml)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Version mismatch: tag=v$TAG_VERSION file=$FILE_VERSION"
            exit 1
          fi
      - name: Verify changelog has section
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if ! grep -q "^## \[$VERSION\]" docs/changelog.md; then
            echo "No ## [$VERSION] section in docs/changelog.md"
            exit 1
          fi

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build distributions
        run: |
          uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/news-watch

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          skip-existing: true
          attestations: true

  create-release:
    name: Create GitHub Release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run python scripts/release_notes.py "$VERSION" > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
